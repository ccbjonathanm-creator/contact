<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <!-- Cette page A LE DROIT de se connecter au Worker (contrairement a Coffre).
       connect-src limite aux seules API Cloudflare de ton relais. -->
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src https://messagerie-relais.contactweb71.workers.dev; base-uri 'none'; form-action 'none'; object-src 'none'; frame-ancestors 'none'" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0b1020" />
  <title>Contact & support — generationapp</title>
  <style>
    :root{color-scheme:dark light}
    *{box-sizing:border-box}
    body{margin:0;min-height:100vh;font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
      background:radial-gradient(1200px 600px at 50% -10%,#1a2440,#0b1020);color:#e7ecf5;
      display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px}
    .card{max-width:460px;text-align:center;background:rgba(20,26,43,.7);border:1px solid rgba(255,255,255,.08);
      border-radius:20px;padding:28px 24px;backdrop-filter:blur(6px)}
    .logo{width:64px;height:64px;border-radius:18px;margin:0 auto 14px;
      background:linear-gradient(135deg,#6d5efc,#22d3ee);display:flex;align-items:center;justify-content:center;font-size:30px}
    h1{font-size:22px;margin:0 0 6px}
    p{margin:0 0 10px;line-height:1.5;opacity:.9;font-size:15px}
    .muted{font-size:13px;opacity:.6}
    @media (prefers-color-scheme:light){
      body{background:radial-gradient(1200px 600px at 50% -10%,#e9edf8,#f5f7fc);color:#1b2233}
      .card{background:rgba(255,255,255,.75);border-color:rgba(0,0,0,.08)}
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">💬</div>
    <h1>Contact & support</h1>
    <p>Une question, un souci de licence ? Écris ton message ci-dessous.
       Ta demande arrive directement chez nous, <b>sans que tu donnes ton email ni ton numéro</b>.</p>
    <p class="muted">Conversation anonyme et chiffrée. Reviens sur cette page (ou garde-la ouverte)
       pour voir la réponse s'afficher.</p>
  </div>

  <!-- La config est dans un fichier externe (la CSP script-src 'self' interdit l'inline). -->
  <script src="config.js?v=2"></script>
  <script src="chat.js?v=2" defer></script>
</body>
</html>
